[keyboard]
name = "Ergohaven Imperial44"
product_name = "Imperial44"
vendor_id = 0xE126
product_id = 0x0044
manufacturer = "Ergohaven"
chip = "nrf52840"

[host]
vial_enabled = true
unlock_keys = [[0, 5], [0, 4]]

[layout]
rows = 8
cols = 6
layers = 16
# imperial44: 4 rows split (left: rows 0-3, right: rows 4-7)
# ZMK transform: RC(r,5..0) left, RC(r,6..11) right
# In RMK: left half row=0-3 col=0-5, right half row=4-7 col=0-5
# col[0]=P1_11 → logical col5 (rightmost of left = T side)
# col[5]=P0_02 → logical col0 (leftmost of left = Esc side)
matrix_map = """
(0,5) (0,4) (0,3) (0,2) (0,1) (0,0)                    (4,0) (4,1) (4,2) (4,3) (4,4) (4,5)
(1,5) (1,4) (1,3) (1,2) (1,1) (1,0)                    (5,0) (5,1) (5,2) (5,3) (5,4) (5,5)
(2,5) (2,4) (2,3) (2,2) (2,1) (2,0) (3,0)    (7,0) (6,0) (6,1) (6,2) (6,3) (6,4) (6,5)
                        (3,3) (3,2) (3,1)    (7,1) (7,2) (7,3)
"""

[[layer]]
name = "Base"
# From ergohaven-zmk imperial44.keymap base layer
keys = """
Escape  Q     W     E     R     T     Y     U     I     O     P     Backspace
Tab     A     S     D     F     G     H     J     K     L     Semicolon  LGui
LShift  Z     X     C     V     B     LeftBracket  RightBracket  N  M  Comma  Dot  Quote  RShift
                          LCtrl MO(1) Space Enter MO(2) LAlt
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[[layer]]
name = "Nav"
# From ergohaven-zmk imperial44.keymap nav layer
keys = """
_   Kc1   Kc2   Kc3   Kc4   Kc5   Kc6   Kc7   Kc8   Kc9   Kc0   _
_   Home  Insert  Delete  End  WM(LAlt,LShift)  _  Left  Down  Up  Right  _
_   WM(Z,LCtrl)  WM(X,LCtrl)  WM(C,LCtrl)  WM(V,LCtrl)  PrintScreen  _  _  CapsLock  WM(Left,LCtrl)  PageDown  PageUp  WM(Right,LCtrl)  _
                              _     _     _     _     MO(3)  _
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[[layer]]
name = "Symbols"
# From ergohaven-zmk imperial44.keymap sym layer
keys = """
_  SHIFTED(Kc2)  SHIFTED(Comma)  Equal  SHIFTED(Dot)  Grave   SHIFTED(Kc6)  LeftBracket  SHIFTED(Minus)  RightBracket  _  _
_  Backslash  SHIFTED(Kc9)  Minus  SHIFTED(Kc0)  SHIFTED(Equal)  SHIFTED(Kc5)  SHIFTED(LeftBracket)  Semicolon  SHIFTED(RightBracket)  SHIFTED(Kc1)  _
_  SHIFTED(Kc3)  SHIFTED(Kc8)  SHIFTED(Semicolon)  Slash  _  _  _  SHIFTED(Backslash)  SHIFTED(Grave)  SHIFTED(Kc7)  SHIFTED(Kc4)  _  _
                      _     MO(3)  _  _  _  _
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[[layer]]
name = "Adjust"
# From ergohaven-zmk imperial44.keymap adj layer
# User0..User4=BT profiles 0..4, User5=NEXT BT, User6=PREV BT, User7=CLR BT, User8=BT toggle
keys = """
Bootloader  _  F1  F2  F3  F4  User0  User1  User2  User5  User6  User7
_  _  F5  F6  F7  F8  OutputBluetooth  AudioVolDown  AudioMute  AudioVolUp  _  _
_  _  F9  F10  F11  F12  OutputUsb  MediaPrevTrack  MediaPlayPause  MediaNextTrack  _  _
                    _  _  _  _  _  _
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[ble]
enabled = true
battery_adc_pin = "P0_31"
adc_divider_measured = 782
adc_divider_total = 1185

[split]
connection = "ble"

[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0

[split.central.matrix]
# ZMK left col order: P1_11, P1_10, P0_03, P0_28, P1_13, P0_02
row_pins = ["P0_29", "P0_10", "P0_09", "P0_24"]
col_pins = ["P1_11", "P1_10", "P0_03", "P0_28", "P1_13", "P0_02"]

[[split.central.input_device.encoder]]
pin_a = "P1_02"
pin_b = "P1_00"
phase = "resolution"
resolution = 2
internal_pullup = true

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 4
col_offset = 0

[split.peripheral.matrix]
# ZMK right col order: P1_13, P0_02, P0_29, P0_10, P0_09, P0_24
row_pins = ["P0_13", "P0_28", "P0_03", "P1_10"]
col_pins = ["P1_13", "P0_02", "P0_29", "P0_10", "P0_09", "P0_24"]

[[split.peripheral.input_device.encoder]]
pin_a = "P1_02"
pin_b = "P1_00"
phase = "resolution"
resolution = 2
internal_pullup = true

[rmk]
split_peripherals_num = 1
split_central_sleep_timeout_seconds = 120
combo_max_num = 32
morse_max_num = 32
macro_space_size = 2048
ble_profiles_num = 5

[storage]
clear_storage = false

# Prevent cargo from looking for a workspace above this directory
[workspace]
members = ["."]
