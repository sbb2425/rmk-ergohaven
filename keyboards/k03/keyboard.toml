[keyboard]
name = "Ergohaven K:03"
product_name = "K:03"
vendor_id = 0xE126
product_id = 0x0070
manufacturer = "Ergohaven"
chip = "nrf52840"

[host]
# Enable Vial support
vial_enabled = true
# Unlock keys: hold simultaneously to unlock Vial config
unlock_keys = [[0, 5], [0, 4]]

[layout]
rows = 10
cols = 6
layers = 16
# matrix_map: maps physical (row,col) positions to logical matrix positions
# Left half rows 0-4, Right half rows 5-9
matrix_map = """
(0,5) (0,4) (0,3) (0,2) (0,1) (0,0)                    (5,0) (5,1) (5,2) (5,3) (5,4) (5,5)
(1,5) (1,4) (1,3) (1,2) (1,1) (1,0)                    (6,0) (6,1) (6,2) (6,3) (6,4) (6,5)
(2,5) (2,4) (2,3) (2,2) (2,1) (2,0)                    (7,0) (7,1) (7,2) (7,3) (7,4) (7,5)
(3,5) (3,4) (3,3) (3,2) (3,1) (3,0) (4,0)    (9,0) (8,0) (8,1) (8,2) (8,3) (8,4) (8,5)
             (4,5) (4,4) (4,3) (4,2) (4,1)    (9,1) (9,2) (9,3) (9,4) (9,5)
"""

[[layer]]
name = "Base"
# Matches ergohaven-zmk k03.keymap base layer
keys = """
Grave   Kc1   Kc2   Kc3   Kc4   Kc5   Kc6   Kc7   Kc8   Kc9   Kc0   Backspace
Escape  Q     W     E     R     T     Y     U     I     O     P     Backslash
Tab     A     S     D     F     G     H     J     K     L     Semicolon  Quote
LShift  Z     X     C     V     B     LeftBracket    RightBracket  N  M  Comma  Dot  Slash  RShift
LGui    LAlt  LCtrl MO(1) Space Enter MO(2) RCtrl RAlt  RGui
"""
# encoders: [central_enc1, central_enc2, central_enc3, peripheral_enc1, peripheral_enc2, peripheral_enc3]
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[[layer]]
name = "Nav"
# Matches ergohaven-zmk k03.keymap nav layer
keys = """
F1  F2  F3               F4        F5               F6      F7        F8    F9    F10  F11  F12
_   _   Home             Up        End              Insert  PageUp    Kc7   Kc8   Kc9  _    _
_   _   Left             Down      Right            Enter   PageDown  Kc4   Kc5   Kc6  _    _
_   _   WM(Left,LCtrl)   CapsLock  WM(Right,LCtrl)  Delete  _   _   PrintScreen  Kc1  Kc2  Kc3  _  _
_   _   _                _         _     _   MO(3)   _      Kc0  _
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[[layer]]
name = "Symbols"
# Matches ergohaven-zmk k03.keymap sym layer
# All shifted chars use SHIFTED() — RMK applies LShift automatically
keys = """
_  _              SHIFTED(Kc2)   SHIFTED(Kc4)  SHIFTED(Kc3)  _             _             _                SHIFTED(Kc6)          _                     _              _
_  _              SHIFTED(Comma) Equal         SHIFTED(Dot)  Grave         _             LeftBracket      SHIFTED(Minus)        RightBracket          _              _
_  Backslash      SHIFTED(Kc9)   Minus         SHIFTED(Kc0)  SHIFTED(Equal) SHIFTED(Kc5) SHIFTED(LeftBracket)  Semicolon  SHIFTED(RightBracket)  SHIFTED(Kc1)  _
_  _   SHIFTED(Kc8)  SHIFTED(Semicolon)  Slash  _  _  _  _  SHIFTED(Backslash)  SHIFTED(Grave)  SHIFTED(Kc7)  _  _
_  _  _  MO(3)  _  _  _  _  _  _
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[[layer]]
name = "Adjust"
# Matches ergohaven-zmk k03.keymap adj layer
# User0..User4=BT profiles 0..4, User5=NEXT BT, User6=PREV BT, User7=CLR BT, User8=BT toggle
# These match the customKeycodes in vial.json.
# OutputBluetooth/OutputUsb: switch output mode
keys = """
_             _        _           _          _          _           User0  User1  User2  _  User8  User7
_             _        _           _          _          _           _      _      _      _      _      _
_             _        _           _          _          _           OutputBluetooth  AudioVolDown  AudioMute  AudioVolUp  _  _
_             _        _           _          _          _  OutputUsb  _  _  MediaPrevTrack  MediaPlayPause  MediaNextTrack  _  _
_             _        _           _          _          _           _      _      _      _
"""
encoders = [["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"],["AudioVolUp","AudioVolDown"]]

[ble]
enabled = true
# Battery ADC: P0_31 (AIN7), voltage divider 1564k/(806k+1564k)
battery_adc_pin = "P0_31"
adc_divider_measured = 782
adc_divider_total = 1185

[split]
connection = "ble"

[split.central]
rows = 5
cols = 6
row_offset = 0
col_offset = 0
# ble_addr removed — RMK manages addresses from storage automatically

[split.central.matrix]
row_pins = ["P0_29", "P1_11", "P0_09", "P0_24", "P0_13"]
col_pins = ["P0_10", "P1_10", "P0_02", "P1_13", "P0_28", "P0_03"]

[[split.central.input_device.encoder]]
pin_a = "P1_02"
pin_b = "P1_00"
phase = "resolution"
resolution = 2
internal_pullup = true

[[split.central.input_device.encoder]]
pin_a = "P0_22"
pin_b = "P0_20"
phase = "resolution"
resolution = 2
internal_pullup = true

[[split.central.input_device.encoder]]
pin_a = "P1_06"
pin_b = "P1_04"
phase = "resolution"
resolution = 2
internal_pullup = true

[[split.peripheral]]
rows = 5
cols = 6
row_offset = 5
col_offset = 0
# ble_addr removed — RMK manages addresses from storage automatically

[split.peripheral.matrix]
row_pins = ["P0_13", "P0_24", "P1_13", "P0_02", "P0_29"]
col_pins = ["P0_09", "P0_10", "P0_28", "P0_03", "P1_10", "P1_11"]

[[split.peripheral.input_device.encoder]]
pin_a = "P1_02"
pin_b = "P1_00"
phase = "resolution"
resolution = 2
internal_pullup = true

[[split.peripheral.input_device.encoder]]
pin_a = "P0_22"
pin_b = "P0_20"
phase = "resolution"
resolution = 2
internal_pullup = true

[[split.peripheral.input_device.encoder]]
pin_a = "P1_06"
pin_b = "P1_04"
phase = "resolution"
resolution = 2
internal_pullup = true

[rmk]
split_peripherals_num = 1
split_central_sleep_timeout_seconds = 120
combo_max_num = 32
morse_max_num = 32
macro_space_size = 2048
ble_profiles_num = 5

[storage]
clear_storage = false
