[keyboard]
name = "Ergohaven OP36"
product_name = "OP36"
vendor_id = 0xE126
product_id = 0x0036
manufacturer = "Ergohaven"
chip = "nrf52840"

[host]
vial_enabled = true
unlock_keys = [[0, 4], [0, 3]]

[layout]
rows = 6
cols = 6
layers = 16
# op36: 3 rows x 5+5 cols = 30 + 3+3 thumb = 36 total
# Left: rows 0-2 (cols 0-4 main, col5 = thumb)
# Right: rows 3-5 (cols 0-4 main, col5 = thumb)
matrix_map = """
(0,4) (0,3) (0,2) (0,1) (0,0)    (3,0) (3,1) (3,2) (3,3) (3,4)
(1,4) (1,3) (1,2) (1,1) (1,0)    (4,0) (4,1) (4,2) (4,3) (4,4)
(2,4) (2,3) (2,2) (2,1) (2,0)    (5,0) (5,1) (5,2) (5,3) (5,4)
            (0,5) (1,5) (2,5)    (5,5) (4,5) (3,5)
"""

[[layer]]
name = "Base"
keys = """
Q     W     E     R     T     Y     U     I     O     P
A     S     D     F     G     H     J     K     L     Semicolon
Z     X     C     V     B     N     M     Comma Dot   Quote
            LCtrl MO(1) Space Enter MO(2) LAlt
"""

[[layer]]
name = "Nav"
keys = """
Kc1   Kc2   Kc3   Kc4   Kc5   Kc6   Kc7   Kc8   Kc9   Kc0
Home  Insert Delete End   Enter _     Left  Down  Up    Right
_     _      _     _     Delete CapsLock WM(Left,LCtrl) PageDown PageUp WM(Right,LCtrl)
            _     _     _     _     MO(3) _
"""

[[layer]]
name = "Symbols"
keys = """
SHIFTED(Kc2) SHIFTED(Comma) Equal SHIFTED(Dot) Grave   SHIFTED(Kc6) LeftBracket Minus RightBracket _
Backslash SHIFTED(Kc9) Minus SHIFTED(Kc0) SHIFTED(Equal) SHIFTED(Kc5) SHIFTED(LeftBracket) Semicolon SHIFTED(RightBracket) SHIFTED(Kc1)
_ SHIFTED(Kc8) SHIFTED(Semicolon) Slash SHIFTED(Kc4) SHIFTED(Kc2) SHIFTED(Backslash) SHIFTED(Grave) SHIFTED(Kc7) _
            _     MO(3) SHIFTED(Kc3) _ _ _
"""

[[layer]]
name = "Adjust"
keys = """
Bootloader F1  F2  F3  F4  User0  User1  User2  User5  User7
LGui  F5  F6  F7  F8  OutputBluetooth  AudioVolDown  AudioVolUp  AudioMute  LAlt
_     F9  F10 F11 F12  OutputUsb  MediaPrevTrack  MediaPlayPause  MediaNextTrack  _
            _  _  _  _  _  _
"""

[ble]
enabled = true
# Battery ADC: P0_31 (AIN7), voltage divider 1564k/(806k+1564k)
battery_adc_pin = "P0_31"
adc_divider_measured = 782
adc_divider_total = 1185

[split]
connection = "ble"

[split.central]
rows = 3
cols = 6
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P1_09", "P0_05", "P0_09"]
col_pins = ["P0_13", "P0_24", "P0_10", "P0_03", "P1_10", "P1_11"]

[[split.peripheral]]
rows = 3
cols = 6
row_offset = 3
col_offset = 0

[split.peripheral.matrix]
row_pins = ["P1_09", "P0_05", "P1_10"]
col_pins = ["P0_30", "P0_29", "P0_02", "P1_13", "P0_28", "P0_03"]

[rmk]
split_peripherals_num = 1
split_central_sleep_timeout_seconds = 120
combo_max_num = 32
morse_max_num = 32
macro_space_size = 2048
ble_profiles_num = 5

[storage]
clear_storage = false

# Prevent cargo from looking for a workspace above this directory
[workspace]
members = ["."]
